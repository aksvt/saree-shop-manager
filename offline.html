<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline — मनभावन वस्त्रालय</title>
<style>
  body { font-family: 'DM Sans', sans-serif; background: #4A0812; color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; text-align: center; padding: 20px; }
  .box { max-width: 300px; }
  .emoji { font-size: 64px; margin-bottom: 16px; }
  h1 { font-size: 22px; margin-bottom: 8px; }
  p  { font-size: 14px; opacity: 0.8; line-height: 1.6; }
  button { margin-top: 20px; padding: 12px 24px; background: #C9972E; color: #4A0812; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; }
</style>
</head>
<body>
<div class="box">
  <div class="emoji">📵</div>
  <h1>Internet नहीं है</h1>
  <p>आप अभी offline हैं। Internet connection होने पर app फिर से काम करेगा।<br><br>आपका सारा data safe है।</p>
  <button onclick="location.reload()">🔄 दोबारा कोशिश करें</button>
</div>
</body>
</html>
